name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Debug: env, Node/npm, files
        env:
          BASE_URL: '/BudgetWise/'
        run: |
          echo "---- ENV ----"
          env | sort
          echo "---- VERSIONS ----"
          node -v || true
          npm -v || true
          echo "---- WORKDIR ----"
          pwd
          echo "---- ROOT FILES ----"
          ls -la
          echo "---- package.json ----"
          cat package.json || true

      - name: Build
        env:
          # For a repo site, set BASE_URL to '/<repo-name>/'.
          BASE_URL: '/BudgetWise/'
        run: |
          set -x
          npm run build
          echo "---- DIST LISTING ----"
          ls -la dist || true

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
