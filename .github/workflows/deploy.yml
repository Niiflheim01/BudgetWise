name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          # Set BASE_URL so Vite emits correct asset paths for repo pages
          # If your repo is `Niiflheim01/BudgetWise`, BASE_URL should be '/BudgetWise/'
          echo "BASE_URL=${{ env.BASE_URL || '/BudgetWise/' }}" >> $GITHUB_ENV
          npm run build

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
